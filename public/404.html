<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Redirecting...</title>
    <script>
      const path = window.location.pathname.replace(/^\/gestor-fotos/, '');
      const redirect = '/gestor-fotos/?redirect=' + encodeURIComponent(path + window.location.search + window.location.hash);
      window.location.replace(redirect);
    </script>
  </head>
  <body></body>
</html>
